# vcstool manifest — 还原整套 OpenArm Labs 工作区
#   cd /DATA/AMD-Sim/OpenArm_Labs && vcs import . < openarm_labs_hub/repos.yaml
# version 字段填分支名（跟随更新）；如需严格复现，把 version 改成下方注释里的 commit。
# 快照时间：2026-06-17

